name: CI

on:
  push:
    branches: [main, develop, production-hardening]
  pull_request:
    branches: [main]

jobs:
  # ── Backend Tests ──────────────────────────────────────────────────────────
  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: acadmix_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/acadmix_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-secret-do-not-use-in-production
      CORS_ORIGINS: http://localhost:3000
      ADMIN_PASSWORD: test-admin-password
      ADMIN_COLLEGE_ID: GNITC

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx
      - name: Run tests
        run: cd backend && python -m pytest tests/ -v --tb=short -x

  # ── Backend Lint ───────────────────────────────────────────────────────────
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Lint backend
        run: cd backend && ruff check app/ --select E,F,W --ignore E501,E402,F401

  # ── Frontend Build ─────────────────────────────────────────────────────────
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: Build (catches compilation errors)
        run: cd frontend && npm run build
        env:
          CI: true
          REACT_APP_BACKEND_URL: https://api.acadmix.org

  # ── Website Build ──────────────────────────────────────────────────────────
  website-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: website/package-lock.json
      - name: Install dependencies
        run: cd website && npm ci
      - name: Build
        run: cd website && npm run build

  # ── Deploy Staging ─────────────────────────────────────────────────────────
  deploy-staging:
    needs: [backend-test, backend-lint, frontend-build]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Deploy backend to staging
        run: echo "TODO — wire Fly.io or Railway deployment"
      - name: Deploy frontend to staging
        run: echo "TODO — wire Vercel deployment"

  # ── Deploy Production ──────────────────────────────────────────────────────
  deploy-production:
    needs: [backend-test, backend-lint, frontend-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy backend
        run: echo "TODO — wire production deployment with approval gate"
      - name: Deploy frontend
        run: echo "TODO — wire Vercel production deployment"
